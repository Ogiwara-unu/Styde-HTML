<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRYDE — Tienda de Zapatos</title>
    <meta name="description" content="STRYDE — Tu tienda de calzado premium. Running, casual, formal y más.">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- STRYDE Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ══════════════════════════════════════════════
     NAVBAR
══════════════════════════════════════════════ -->
<nav class="navbar navbar-stryde navbar-expand-lg">
    <div class="container-fluid px-4">

        <!-- Brand -->
        <a class="navbar-brand" onclick="navigate('home')" style="cursor:pointer">
            STR<span>Y</span>DE
        </a>

        <!-- Toggler -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"
            style="color:rgba(245,242,238,.7)">
            <i class="bi bi-list" style="font-size:1.5rem"></i>
        </button>

        <div class="collapse navbar-collapse" id="navContent">
            <!-- Nav links -->
            <ul class="navbar-nav mx-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link-stryde active" id="nav-home" onclick="navigate('home')" style="cursor:pointer">
                        Inicio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link-stryde" id="nav-cats" onclick="navigate('category',{category:'all'})" style="cursor:pointer">
                        Categorías
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link-stryde" onclick="navigate('search',{})" style="cursor:pointer">
                        Búsqueda
                    </a>
                </li>
            </ul>

            <!-- Search + Cart -->
            <div class="d-flex align-items-center gap-3">
                <!-- Search -->
                <div class="navbar-search" style="position:relative">
                    <input type="text" id="nav-search-input" placeholder="Buscar zapatos...">
                    <i class="bi bi-search search-icon"></i>
                    <!-- Dropdown results -->
                    <div id="search-dropdown" class="search-dropdown"></div>
                </div>

                <!-- Cart -->
                <button class="cart-btn" id="nav-cart" onclick="navigate('cart')">
                    <i class="bi bi-bag"></i>
                    Carrito
                    <span class="cart-count" id="cart-badge">0</span>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- ══════════════════════════════════════════════
     APP — dynamic content injected here
══════════════════════════════════════════════ -->
<div id="app"></div>

<!-- ══════════════════════════════════════════════
     FOOTER — rendered by JS
══════════════════════════════════════════════ -->
<div id="footer"></div>

<!-- ══════════════════════════════════════════════
     TOAST CONTAINER
══════════════════════════════════════════════ -->
<div class="toast-container-stryde" id="toast-container"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- STRYDE Script -->
<script src="js/script.js"></script>
</body>
</html>
